{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search — ConnectNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent:       #6f42c1;
            --accent-dark:  #5a32a3;
            --accent-light: #ede9fb;
            --bg:           #f0f2f5;
            --surface:      #ffffff;
            --border:       #e4e6ea;
            --text:         #1c1e21;
            --muted:        #65676b;
            --green:        #22c55e;
            --nav-h:        56px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            height: var(--nav-h);
            background: #1a1a2e;
            display: flex; align-items: center;
            padding: 0 24px; gap: 4px;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,.3);
        }
        nav .brand { font-size: 1.1rem; font-weight: 700; color: #fff; margin-right: auto; letter-spacing: .5px; }
        nav a { color: #ccc; text-decoration: none; font-size: .88rem; font-weight: 500; padding: 7px 13px; border-radius: 8px; transition: background .18s, color .18s; }
        nav a:hover  { background: rgba(255,255,255,.1); color: #fff; }
        nav a.active { background: var(--accent); color: #fff; }
        nav a.logout { color: #f87171; }
        nav a.logout:hover { background: rgba(248,113,113,.15); }

        /* ── PAGE ── */
        .page {
            max-width: 660px;
            margin: calc(var(--nav-h) + 28px) auto 60px;
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── SEARCH BAR ── */
        .search-bar {
            background: var(--surface);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }

        .search-bar i { color: var(--muted); font-size: 1rem; }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text);
            background: transparent;
        }

        .search-bar input::placeholder { color: #aaa; }

        /* ── RESULTS ── */
        #results { display: flex; flex-direction: column; gap: 10px; }

        .result-card {
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            animation: slideIn .15s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result-avatar {
            width: 50px; height: 50px; border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-light);
            background: linear-gradient(135deg, var(--accent), #9b59b6);
            flex-shrink: 0;
        }

        .result-avatar-placeholder {
            width: 50px; height: 50px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #9b59b6);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 1.1rem;
            border: 2px solid var(--accent-light);
            flex-shrink: 0;
        }

        .result-info { flex: 1; min-width: 0; }

        .result-name {
            font-weight: 600;
            font-size: .97rem;
            color: var(--text);
            text-decoration: none;
        }

        .result-name:hover { color: var(--accent); }

        .connect-btn {
            padding: 7px 16px;
            border: none;
            border-radius: 8px;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background .15s, opacity .15s;
            white-space: nowrap;
        }

        .connect-btn.send   { background: var(--accent-light); color: var(--accent); }
        .connect-btn.send:hover { background: #ddd4f8; }
        .connect-btn.sent   { background: #f1f3f4; color: var(--muted); cursor: default; }
        .connect-btn.connected { background: #dcfce7; color: #15803d; cursor: default; }
        .connect-btn.rejected  { background: #fef2f2; color: #ef4444; cursor: default; }

        /* ── EMPTY / PROMPT ── */
        .hint {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: .95rem;
        }

        .hint i { font-size: 2.5rem; color: #ccc; display: block; margin-bottom: 10px; }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: #1c1e21; color: #fff;
            padding: 11px 18px; border-radius: 10px;
            font-size: .9rem;
            opacity: 0; transform: translateY(8px);
            transition: opacity .3s, transform .3s;
            pointer-events: none; z-index: 999;
        }

        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>

<body>

    {% include 'cn_nav.html' %}

    <div class="page">

        <!-- Search bar -->
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="Search people by name…" autocomplete="off">
        </div>



        <!-- Search results injected here -->
        <div id="results">
            <div class="hint" id="search-hint">
                <i class="fa-solid fa-users"></i>
                Search for people to connect with
            </div>
        </div>

    </div>

    <!-- Hidden template for result cards -->
    <div id="search-template" style="display:none;">
        <div class="result-card">
            <div class="result-avatar-placeholder" id="tpl-avatar"></div>
            <div class="result-info">
                <a href="#" class="result-name profile-link" id="tpl-name">Username</a>
            </div>
            <button class="connect-btn send" id="add-frq">
                <i class="fa-solid fa-user-plus"></i> Connect
            </button>
        </div>
    </div>

    <script>


        // ── Live search (debounced 400ms) ──
        let searchTimeout = null;

        $('#search-input').on('input', function () {
            clearTimeout(searchTimeout);
            const query = $(this).val().trim();

            if (query.length === 0) {
                $('#results').html('<div class="hint" id="search-hint"><i class="fa-solid fa-users"></i>Search for people to connect with</div>');
                return;
            }

            searchTimeout = setTimeout(() => {
                $.ajax({
                    type: 'GET',
                    url: "{% url 'filter_s' %}",
                    data: { q: query },
                    success: function (response) {
                        const container = $('#results');
                        container.empty();

                        if (response.results.length === 0) {
                            container.html('<div class="hint"><i class="fa-solid fa-user-xmark"></i>No users found for "' + query + '"</div>');
                            return;
                        }

                        response.results.forEach(user => {
                            const clone = $('#search-template > div').clone();

                            // Avatar — use profile pic or initial
                            const avatarEl = clone.find('#tpl-avatar');
                            if (user.profile_pic && !user.profile_pic.includes('default.jpg')) {
                                avatarEl.replaceWith(`<img class="result-avatar" src="${user.profile_pic}" alt="${user.username}">`);
                            } else {
                                avatarEl.text(user.username[0].toUpperCase());
                            }

                            // Name + profile link
                            clone.find('#tpl-name')
                                .text(user.username)
                                .attr('href', `/user/${user.username}/`);

                            // Connect button
                            const btn = clone.find('#add-frq');
                            const reqUrl = `/friends/send/${user.username}/`;
                            btn.attr('data-url', reqUrl).attr('class', 'connect-btn');

                            if (user.id === response.curr_user) {
                                btn.remove(); // Don't show button for self
                            } else if (user.status === 'pending') {
                                btn.html('<i class="fa-solid fa-xmark"></i> Cancel Request')
                                   .addClass('cancel')
                                   .attr('data-url', `/friends/cancel/${user.username}/`)
                                   .attr('data-username', user.username);
                            } else if (user.status === 'accepted' || user.status === 'friends') {
                                btn.html('<i class="fa-solid fa-check"></i> Connected').addClass('connected').prop('disabled', true);
                            } else if (user.status === 'rejected') {
                                btn.html('<i class="fa-solid fa-rotate-right"></i> Resend Request')
                                   .addClass('resend')
                                   .attr('data-username', user.username);
                            } else {
                                btn.html('<i class="fa-solid fa-user-plus"></i> Connect').addClass('send');
                                btn.attr('data-username', user.username);
                            }

                            container.append(clone);
                        });
                    }
                });
            }, 400);
        });

        // ── Send / Resend friend request ──
        $(document).on('click', '.connect-btn.send, .connect-btn.resend', function () {
            const btn = $(this);
            const url = btn.data('url');
            const username = btn.data('username');

            $.ajax({
                type: 'GET',
                url: url,
                success: function (response) {
                    btn.html('<i class="fa-solid fa-xmark"></i> Cancel Request')
                       .removeClass('send resend').addClass('cancel')
                       .attr('data-url', `/friends/cancel/${username}/`);
                    window.cnToast(`✅ Friend request sent to ${username}!`);
                },
                error: function () {
                    window.cnToast('❌ Something went wrong.');
                }
            });
        });

        // ── Cancel friend request ──
        $(document).on('click', '.connect-btn.cancel', function () {
            const btn = $(this);
            const url = btn.data('url');
            const username = btn.data('username');

            $.ajax({
                type: 'GET',
                url: url,
                success: function (response) {
                    btn.html('<i class="fa-solid fa-user-plus"></i> Connect')
                       .removeClass('cancel').addClass('send')
                       .attr('data-url', `/friends/send/${username}/`);
                    window.cnToast(`✅ Friend request cancelled.`);
                },
                error: function () {
                    window.cnToast('❌ Failed to cancel request.');
                }
            });
        });



    </script>

</body>
</html>
